<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Media Converter</title>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --panel: rgba(255, 255, 255, 0.08);
            --panel-border: rgba(255, 255, 255, 0.18);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 800px at 15% 10%, #334155 0%, transparent 45%),
                radial-gradient(1200px 800px at 85% 80%, #312e81 0%, transparent 40%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .card {
            width: min(720px, 100%);
            backdrop-filter: blur(10px);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.4rem, 2.7vw, 2rem);
            line-height: 1.2;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--text-muted);
            font-size: 0.96rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .file-drop-label {
            margin-bottom: 10px;
        }

        .file-input-hidden {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        .drop-zone {
            width: 100%;
            min-height: 170px;
            border: 2px dashed rgba(148, 163, 184, 0.8);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.45);
            display: grid;
            place-items: center;
            text-align: center;
            padding: 18px;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .drop-zone:hover {
            border-color: rgba(99, 102, 241, 0.95);
            background: rgba(30, 41, 59, 0.6);
        }

        .drop-zone.drag-over {
            border-color: #22d3ee;
            background: rgba(8, 47, 73, 0.5);
            transform: scale(1.01);
        }

        .upload-icon {
            font-size: 2rem;
            line-height: 1;
            margin-bottom: 10px;
            color: #cbd5e1;
        }

        .drop-zone-text {
            margin: 0;
            color: #dbeafe;
        }

        .drop-zone-text strong {
            color: #ffffff;
        }

        .file-name {
            margin-top: 8px;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .span-2 {
            grid-column: span 2;
        }

        label {
            display: inline-block;
            margin-bottom: 7px;
            font-weight: 600;
        }

        input, select, button {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(15, 23, 42, 0.55);
            color: var(--text);
            padding: 11px 12px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: rgba(99, 102, 241, 0.9);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        button {
            margin-top: 6px;
            border: none;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.2s ease;
        }

        button:hover { filter: brightness(1.08); }
        button:active { transform: translateY(1px); }
        button:disabled {
            background: #64748b;
            cursor: not-allowed;
            filter: grayscale(20%);
        }

        #progressContainer {
            display: none;
            width: 100%;
            margin-top: 14px;
            background: rgba(2, 6, 23, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            overflow: hidden;
            height: 14px;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #06b6d4, #10b981);
            transition: width 0.35s ease;
        }

        #progressText {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: right;
            min-height: 20px;
        }

        #status {
            margin-top: 10px;
            min-height: 24px;
            font-weight: 700;
        }

        .ok { color: var(--success); }
        .err { color: var(--danger); }

        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; }
            .span-2 { grid-column: span 1; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Universal Media Converter</h1>
        <p class="subtitle">Upload once, convert fast. Works with video, audio, and image output formats.</p>

        <form id="convertForm" class="form-grid">
            <div class="form-group span-2">
                <label for="fileInput" class="file-drop-label">Choose file</label>
                <input type="file" id="fileInput" class="file-input-hidden" required>
                <label for="fileInput" id="fileDropZone" class="drop-zone" aria-label="Choose a file or drag it here">
                    <div>
                        <div class="upload-icon" aria-hidden="true">⤴</div>
                        <p class="drop-zone-text"><strong>Choose a file</strong> or drag it here.</p>
                        <div id="fileName" class="file-name">No file selected</div>
                    </div>
                </label>
            </div>

            <div class="form-group">
                <label for="formatSelect">Output format</label>
                <select id="formatSelect" required>
                    <option value="mp4">MP4</option>
                    <option value="mp3">MP3</option>
                    <option value="avi">AVI</option>
                    <option value="gif">GIF</option>
                    <option value="wav">WAV</option>
                    <option value="mkv">MKV</option>
                    <option value="png">PNG (single frame)</option>
                    <option value="jpeg">JPEG/JPG (single frame)</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="customFormatInput">Custom format (optional)</label>
                <input type="text" id="customFormatInput" placeholder="e.g., webm, flac" disabled>
            </div>

            <div class="form-group span-2">
                <button type="submit" id="submitBtn">Convert File</button>
            </div>
        </form>

        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        <div id="progressText"></div>

        <div id="status"></div>
    </main>

    <script>
        const convertForm = document.getElementById('convertForm');
        const fileInput = document.getElementById('fileInput');
        const fileDropZone = document.getElementById('fileDropZone');
        const fileName = document.getElementById('fileName');
        const formatSelect = document.getElementById('formatSelect');
        const customFormatInput = document.getElementById('customFormatInput');
        const statusDiv = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        function getSelectedFormat() {
            if (formatSelect.value === 'custom') {
                return customFormatInput.value.trim().toLowerCase();
            }
            return formatSelect.value.trim().toLowerCase();
        }

        function updateSelectedFileName() {
            if (fileInput.files.length) {
                fileName.innerText = fileInput.files[0].name;
            } else {
                fileName.innerText = 'No file selected';
            }
        }

        fileInput.addEventListener('change', updateSelectedFileName);

        fileDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropZone.classList.add('drag-over');
        });

        fileDropZone.addEventListener('dragleave', () => {
            fileDropZone.classList.remove('drag-over');
        });

        fileDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropZone.classList.remove('drag-over');

            if (e.dataTransfer?.files?.length) {
                fileInput.files = e.dataTransfer.files;
                updateSelectedFileName();
            }
        });

        formatSelect.addEventListener('change', () => {
            const isCustom = formatSelect.value === 'custom';
            customFormatInput.disabled = !isCustom;
            customFormatInput.required = isCustom;
            if (!isCustom) {
                customFormatInput.value = '';
            } else {
                customFormatInput.focus();
            }
        });

        convertForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!fileInput.files.length) return;

            const formatInput = getSelectedFormat();
            if (!formatInput) {
                statusDiv.innerText = 'Please select a format.';
                statusDiv.className = 'err';
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('format', formatInput);

            statusDiv.innerText = 'Uploading... Conversion starts shortly.';
            statusDiv.className = '';
            submitBtn.disabled = true;
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.innerText = '0%';

            const progressInterval = setInterval(async () => {
                try {
                    const res = await fetch('/progress');
                    const data = await res.json();

                    if (data.progress > 0) {
                        statusDiv.innerText = 'Converting...';
                        progressBar.style.width = data.progress + '%';
                        progressText.innerText = data.progress + '%';
                    }
                } catch {
                    // Ignore polling errors quietly.
                }
            }, 500);

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);

                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `converted.${formatInput === 'jpeg' ? 'jpg' : formatInput}`;
                    document.body.appendChild(a);
                    a.click();

                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);

                    statusDiv.innerText = 'Conversion successful!';
                    statusDiv.className = 'ok';
                    progressBar.style.width = '100%';
                    progressText.innerText = 'Done!';
                } else {
                    const errorText = await response.text();
                    statusDiv.innerText = `Error: ${errorText}`;
                    statusDiv.className = 'err';
                }
            } catch {
                statusDiv.innerText = 'A network error occurred.';
                statusDiv.className = 'err';
            } finally {
                clearInterval(progressInterval);
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
